<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="日数計算">
<meta name="theme-color" content="#4f46e5">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>〇〇日後はいつ？</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "ヒラギノ角ゴシック", "Yu Gothic", sans-serif;
    background: linear-gradient(160deg, #4f46e5 0%, #7c3aed 100%);
    color: #fff;
    overflow-x: hidden;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 24px 20px 40px;
  }
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.02em;
    opacity: 0.95;
  }
  .today-card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 16px;
    padding: 16px 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  .today-label {
    font-size: 12px;
    opacity: 0.75;
    margin-bottom: 4px;
    letter-spacing: 0.08em;
  }
  .today-date {
    font-size: 18px;
    font-weight: 500;
  }
  .input-section {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 24px 20px;
    margin-bottom: 20px;
  }
  .input-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .direction-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .direction-btn.active {
    background: #fff;
    color: #4f46e5;
    border-color: #fff;
  }
  input[type="number"] {
    font-size: 42px;
    font-weight: 700;
    width: 140px;
    text-align: center;
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(255,255,255,0.4);
    color: #fff;
    outline: none;
    padding: 6px 0;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type="number"]:focus {
    border-bottom-color: #fff;
  }
  .unit {
    font-size: 18px;
    font-weight: 500;
    opacity: 0.9;
    margin-left: 4px;
  }
  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }
  .preset-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset-btn:active {
    transform: scale(0.95);
    background: rgba(255,255,255,0.3);
  }
  .result-card {
    background: #fff;
    color: #1f2937;
    border-radius: 20px;
    padding: 28px 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }
  .result-label {
    font-size: 12px;
    color: #6b7280;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .result-date {
    font-size: 32px;
    font-weight: 700;
    color: #4f46e5;
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .result-weekday {
    font-size: 16px;
    color: #6b7280;
    margin-bottom: 14px;
  }
  .result-relative {
    font-size: 13px;
    color: #9ca3af;
    padding-top: 14px;
    border-top: 1px solid #f3f4f6;
  }
  .weekday-sun { color: #ef4444; }
  .weekday-sat { color: #3b82f6; }
  footer {
    text-align: center;
    font-size: 11px;
    opacity: 0.6;
    margin-top: auto;
    padding-top: 24px;
  }
</style>
</head>
<body>
  <header>
    <h1>〇〇日後はいつ？</h1>
  </header>

  <div class="today-card">
    <div class="today-label">TODAY</div>
    <div class="today-date" id="todayDate">―</div>
  </div>

  <div class="input-section">
    <div class="input-row">
      <button class="direction-btn active" data-dir="future" id="btnFuture">〇日後</button>
      <button class="direction-btn" data-dir="past" id="btnPast">〇日前</button>
    </div>
    <div class="input-row">
      <input type="number" id="daysInput" value="100" min="0" inputmode="numeric">
      <span class="unit">日</span>
    </div>
    <div class="presets">
      <button class="preset-btn" data-days="30">30</button>
      <button class="preset-btn" data-days="60">60</button>
      <button class="preset-btn" data-days="90">90</button>
      <button class="preset-btn" data-days="120">120</button>
      <button class="preset-btn" id="customBtn">任意</button>
    </div>
  </div>

  <div class="result-card">
    <div class="result-label" id="resultLabel">100日後は</div>
    <div class="result-date" id="resultDate">―</div>
    <div class="result-weekday" id="resultWeekday">―</div>
    <div class="result-relative" id="resultRelative">―</div>
  </div>

  <footer>シンプル日数カリキュレーター</footer>

<script>
  const weekdays = ["日", "月", "火", "水", "木", "金", "土"];
  const todayEl = document.getElementById("todayDate");
  const daysInput = document.getElementById("daysInput");
  const btnFuture = document.getElementById("btnFuture");
  const btnPast = document.getElementById("btnPast");
  const resultLabel = document.getElementById("resultLabel");
  const resultDate = document.getElementById("resultDate");
  const resultWeekday = document.getElementById("resultWeekday");
  const resultRelative = document.getElementById("resultRelative");

  let direction = "future"; // "future" or "past"

  function formatDate(d) {
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    const day = d.getDate();
    return `${y}年${m}月${day}日`;
  }

  function formatToday(d) {
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const w = weekdays[d.getDay()];
    return `${y}年${m}月${day}日（${w}）`;
  }

  function weekdayClass(idx) {
    if (idx === 0) return "weekday-sun";
    if (idx === 6) return "weekday-sat";
    return "";
  }

  function update() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    todayEl.textContent = formatToday(today);

    let n = parseInt(daysInput.value, 10);
    if (isNaN(n) || n < 0) n = 0;

    const offset = direction === "future" ? n : -n;
    const target = new Date(today);
    target.setDate(target.getDate() + offset);

    const wIdx = target.getDay();
    const wName = weekdays[wIdx];

    const labelText = direction === "future" ? `${n}日後は` : `${n}日前は`;
    resultLabel.textContent = labelText;
    resultDate.textContent = formatDate(target);
    resultWeekday.textContent = `${wName}曜日`;
    resultWeekday.className = "result-weekday " + weekdayClass(wIdx);

    // Relative info
    if (n === 0) {
      resultRelative.textContent = "今日です";
    } else {
      const weeks = Math.floor(n / 7);
      const remDays = n % 7;
      let parts = [];
      if (weeks > 0) parts.push(`${weeks}週間`);
      if (remDays > 0) parts.push(`${remDays}日`);
      const breakdown = parts.join("");
      const months = (n / 30.44).toFixed(1);
      const years = (n / 365.25).toFixed(2);
      let extra = "";
      if (n >= 365) extra = `（約${years}年）`;
      else if (n >= 30) extra = `（約${months}ヶ月）`;
      resultRelative.textContent = `${breakdown}${extra}`;
    }
  }

  // Direction toggle
  btnFuture.addEventListener("click", () => {
    direction = "future";
    btnFuture.classList.add("active");
    btnPast.classList.remove("active");
    update();
  });
  btnPast.addEventListener("click", () => {
    direction = "past";
    btnPast.classList.add("active");
    btnFuture.classList.remove("active");
    update();
  });

  // Input
  daysInput.addEventListener("input", update);

  // Presets
  document.querySelectorAll(".preset-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (btn.id === "customBtn") {
        daysInput.focus();
        daysInput.select();
        return;
      }
      daysInput.value = btn.dataset.days;
      update();
    });
  });

  // Refresh "today" if app stays open past midnight
  setInterval(update, 60 * 1000);

  update();

  // Register service worker for offline support
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("service-worker.js")
        .catch((err) => console.warn("SW registration failed:", err));
    });
  }
</script>
</body>
</html>
