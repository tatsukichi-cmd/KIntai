<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="勤怠">
<title>勤怠記録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:#F2F2F7;color:#1C1C1E;min-height:100vh;}
.wrap{padding:1rem;max-width:430px;margin:0 auto;padding-bottom:2rem;}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:1rem;background:#E5E5EA;border-radius:10px;padding:3px;}
.tab{padding:.5rem 0;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:#6E6E73;transition:all .2s;}
.tab.active{background:#fff;color:#1C1C1E;box-shadow:0 1px 3px rgba(0,0,0,.12);}
.clock-time{font-size:42px;font-weight:200;color:#1C1C1E;letter-spacing:-1px;text-align:center;font-variant-numeric:tabular-nums;}
.clock-date{font-size:13px;color:#8E8E93;text-align:center;margin-top:2px;margin-bottom:.9rem;}
.period-badge{text-align:center;margin-bottom:.9rem;}
.period-badge span{font-size:12px;color:#8E8E93;background:#fff;border-radius:20px;padding:4px 14px;display:inline-block;}
.status-card{background:#fff;border-radius:14px;padding:.9rem 1.1rem;margin-bottom:.9rem;text-align:center;}
.status-label{font-size:11px;color:#8E8E93;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;}
.status-value{font-size:15px;font-weight:500;color:#1C1C1E;}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.9rem;}
.btn-in,.btn-out{padding:1.1rem 0;border-radius:14px;font-size:20px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s,transform .1s;-webkit-appearance:none;}
.btn-in{background:#34C759;color:#fff;}
.btn-out{background:#FF3B30;color:#fff;}
.btn-in:disabled,.btn-out:disabled{opacity:.3;}
.btn-in:not(:disabled):active,.btn-out:not(:disabled):active{transform:scale(.97);}
.ot-banner{border-radius:14px;padding:.9rem 1.2rem;margin-bottom:.9rem;display:flex;align-items:center;justify-content:space-between;}
.ot-banner.none{background:#fff;}
.ot-banner.over{background:#FFF2F1;}
.ot-left{font-size:12px;color:#8E8E93;}
.ot-left.over{color:#C0392B;}
.ot-right{font-size:28px;font-weight:300;color:#1C1C1E;font-variant-numeric:tabular-nums;}
.ot-right.over{color:#FF3B30;}
.ot-sub{font-size:11px;color:#8E8E93;margin-top:2px;}
.ot-sub.over{color:#C0392B;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.9rem;}
.stat{background:#fff;border-radius:14px;padding:.75rem 1rem;}
.stat-label{font-size:11px;color:#8E8E93;margin-bottom:4px;}
.stat-val{font-size:20px;font-weight:300;color:#1C1C1E;font-variant-numeric:tabular-nums;}
.stat-val.ot{color:#FF3B30;}
.progress-wrap{background:#fff;border-radius:14px;padding:.85rem 1rem;margin-bottom:.9rem;}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:#8E8E93;margin-bottom:8px;}
.progress-bar{height:6px;background:#E5E5EA;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;background:#34C759;transition:width .4s;}
.progress-fill.over{background:#FF3B30;}
.info-box{background:#fff;border-radius:14px;padding:.75rem 1rem;margin-bottom:.9rem;font-size:11px;color:#8E8E93;line-height:1.8;}
.sec-title{font-size:13px;font-weight:500;color:#8E8E93;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;padding:0 2px;}
.sec-btns{display:flex;gap:6px;}
.btn-sm{font-size:12px;background:#fff;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;color:#007AFF;font-weight:500;}
.btn-add{font-size:13px;background:#34C759;color:#fff;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;font-weight:500;}
.record{background:#fff;border-radius:14px;padding:.75rem 1rem;margin-bottom:8px;cursor:pointer;transition:background .15s;}
.record:active{background:#F2F2F7;}
.rec-top{display:flex;justify-content:space-between;align-items:center;}
.rec-date{font-size:13px;color:#8E8E93;}
.rec-times{font-size:14px;color:#1C1C1E;}
.rec-detail{font-size:11px;color:#8E8E93;margin-top:3px;display:flex;justify-content:space-between;}
.rec-ot{color:#FF3B30;}
.dot-in{color:#34C759;}
.dot-out{color:#FF3B30;}
.hist-period{background:#fff;border-radius:14px;padding:.85rem 1rem;margin-bottom:8px;cursor:pointer;}
.hist-period.expanded{outline:1.5px solid #E5E5EA;}
.hp-top{display:flex;justify-content:space-between;align-items:center;}
.hp-label{font-size:14px;font-weight:500;color:#1C1C1E;}
.hp-ot{font-size:15px;font-weight:500;}
.hp-ot.zero{color:#8E8E93;}
.hp-ot.over{color:#FF3B30;}
.hp-sub{font-size:11px;color:#8E8E93;margin-top:4px;display:flex;gap:12px;}
.hp-detail{margin-top:.75rem;border-top:0.5px solid #E5E5EA;padding-top:.75rem;display:none;}
.hp-detail.open{display:block;}
.hp-rec{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 0;border-bottom:0.5px solid #F2F2F7;cursor:pointer;}
.hp-rec:last-of-type{border-bottom:none;}
.hp-rec-date{color:#8E8E93;width:70px;}
.hp-rec-work{color:#1C1C1E;flex:1;text-align:center;}
.hp-rec-ot{color:#FF3B30;width:50px;text-align:right;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.85);backdrop-filter:blur(10px);border-radius:20px;padding:.6rem 1.2rem;font-size:13px;color:#fff;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:100;}
.toast.show{opacity:1;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#F2F2F7;border-radius:20px 20px 0 0;padding:1.25rem 1.25rem 2.5rem;width:100%;max-width:430px;}
.modal-handle{width:36px;height:4px;background:#C7C7CC;border-radius:2px;margin:0 auto 1rem;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:1.25rem;color:#1C1C1E;text-align:center;}
.field{background:#fff;border-radius:12px;padding:.75rem 1rem;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.field label{font-size:15px;color:#1C1C1E;}
.field input{border:none;background:none;font-size:15px;color:#007AFF;text-align:right;outline:none;width:140px;}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1rem;}
.modal-btns button{padding:.75rem 0;border-radius:12px;font-size:16px;cursor:pointer;border:none;background:#fff;color:#1C1C1E;font-weight:500;}
.modal-btns .btn-save{background:#34C759;color:#fff;}
.btn-del{margin-top:8px;width:100%;padding:.75rem 0;border-radius:12px;font-size:15px;cursor:pointer;border:none;background:#fff;color:#FF3B30;font-weight:500;}
.btn-add-period{margin-top:8px;width:100%;padding:.55rem 0;border-radius:10px;font-size:13px;cursor:pointer;border:none;background:#F2F2F7;color:#34C759;font-weight:500;}
</style>

<link rel="manifest" href="manifest.json">
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/KIntai/sw.js');
  });
}

</head>
<body>
<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">打刻</button>
    <button class="tab" onclick="switchTab('history')">実績</button>
  </div>

  <div id="tabToday">
    <div class="clock-time" id="clockTime">--:--:--</div>
    <div class="clock-date" id="clockDate"></div>
    <div class="period-badge"><span id="periodLabel">集計期間：--</span></div>
    <div class="status-card">
      <div class="status-label">今日のステータス</div>
      <div class="status-value" id="statusText">未打刻</div>
    </div>
    <div class="btn-row">
      <button class="btn-in" id="btnIn" onclick="clockIn()">出勤</button>
      <button class="btn-out" id="btnOut" onclick="clockOut()" disabled>退勤</button>
    </div>
    <div class="ot-banner none" id="otBanner">
      <div>
        <div class="ot-left" id="otLabel">今期の時間外</div>
        <div class="ot-sub" id="otSub">--</div>
      </div>
      <div class="ot-right" id="otValue">0h00m</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-label">今日の実労働時間</div><div class="stat-val" id="todayH">--</div></div>
      <div class="stat"><div class="stat-label">今日の時間外</div><div class="stat-val" id="todayOT">--</div></div>
      <div class="stat"><div class="stat-label">今期の出勤日数</div><div class="stat-val" id="periodDays">0日</div></div>
      <div class="stat"><div class="stat-label">今期の総実労働時間</div><div class="stat-val" id="monthH">0h</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><span>今期の進捗</span><span id="progressLabel">0 / 0h</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="info-box">
      休憩 自動差引：10:00〜10:10 / 12:00〜12:45 / 15:00〜15:10（計65分）<br>
      時間外：8:00より前 ＋ 17:00より後　／　締め：毎月21日〜翌20日
    </div>
    <div class="sec-title">
      <span>今期の記録（タップで編集）</span>
      <div class="sec-btns">
        <button class="btn-add" onclick="openAdd()">＋ 追加</button>
        <button class="btn-sm" onclick="downloadCSV()">📥 CSV</button>
      </div>
    </div>
    <div id="historyList"></div>
  </div>

  <div id="tabHistory" style="display:none;">
    <div class="sec-title"><span>過去12ヶ月の実績</span></div>
    <div id="histPeriods"></div>
  </div>
</div>

<div class="overlay" id="editOverlay" onclick="overlayTap(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title" id="editTitle">記録を追加</div>
    <div class="field"><label>日付</label><input type="date" id="editDate"></div>
    <div class="field"><label>出勤時刻</label><input type="time" id="editIn"></div>
    <div class="field"><label>退勤時刻</label><input type="time" id="editOut"></div>
    <div class="modal-btns">
      <button onclick="closeEdit()">キャンセル</button>
      <button class="btn-save" onclick="saveEdit()">保存</button>
    </div>
    <button class="btn-del" id="btnDel" onclick="deleteRecord()" style="display:none;">この記録を削除</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BREAK_MINS=65,WORK_START=8*60,WORK_END=17*60;
const DAILY_MINS=(WORK_END-WORK_START)-BREAK_MINS;
const MONTH_WORK_DAYS=20;
let records=JSON.parse(localStorage.getItem('kintai_iphone')||'[]');
let editIdx=null,timerInt;

function pad(n){return String(n).padStart(2,'0');}
function todayKey(){const n=new Date();return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;}
function nowTimeStr(){const n=new Date();return `${pad(n.getHours())}:${pad(n.getMinutes())}`;}
function toMins(t){if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m;}
function hm(mins){const sign=mins<0?'-':'';const a=Math.abs(Math.round(mins));return `${sign}${Math.floor(a/60)}h${pad(a%60)}m`;}
function save(){localStorage.setItem('kintai_iphone',JSON.stringify(records));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function getToday(){return records.find(r=>r.date===todayKey())||null;}

function getCurrentPeriod(){
  const now=new Date(),d=now.getDate(),y=now.getFullYear(),m=now.getMonth();
  let sY,sM,eY,eM;
  if(d<=20){sM=m-1;sY=y;if(sM<0){sM=11;sY=y-1;}eM=m;eY=y;}
  else{sM=m;sY=y;eM=m+1;eY=y;if(eM>11){eM=0;eY=y+1;}}
  return{start:`${sY}-${pad(sM+1)}-21`,end:`${eY}-${pad(eM+1)}-20`};
}
function getPastPeriods(n){
  const periods=[],now=new Date(),d=now.getDate(),y=now.getFullYear(),m=now.getMonth();
  let baseY=y,baseM=m;
  if(d<=20){baseM=m-1;if(baseM<0){baseM=11;baseY=y-1;}}
  for(let i=1;i<=n;i++){
    let sM=baseM-i,sY=baseY;
    while(sM<0){sM+=12;sY--;}
    let eM=sM+1,eY=sY;
    if(eM>11){eM=0;eY=sY+1;}
    periods.push({start:`${sY}-${pad(sM+1)}-21`,end:`${eY}-${pad(eM+1)}-20`});
  }
  return periods;
}
function inPeriod(d,p){return d>=p.start&&d<=p.end;}
function calcDay(r){
  if(!r.in||!r.out)return null;
  const inM=toMins(r.in),outM=toMins(r.out);
  if(outM<=inM)return null;
  // 実際に勤務した時間帯に含まれる休憩だけ差し引く
  const breaks=[
    {s:10*60,e:10*60+10},   // 10:00〜10:10
    {s:12*60,e:12*60+45},   // 12:00〜12:45
    {s:15*60,e:15*60+10},   // 15:00〜15:10
  ];
  let breakMins=0;
  breaks.forEach(b=>{
    const os=Math.max(inM,b.s), oe=Math.min(outM,b.e);
    if(oe>os) breakMins+=oe-os;
  });
  const totalMins=Math.max(0,outM-inM-breakMins);
  const earlyOT=inM<WORK_START?WORK_START-inM:0;
  const lateOT=outM>WORK_END?outM-WORK_END:0;
  return{totalMins,otMins:earlyOT+lateOT,earlyOT,lateOT,breakMins};
}

function switchTab(tab){
  document.getElementById('tabToday').style.display=tab==='today'?'block':'none';
  document.getElementById('tabHistory').style.display=tab==='history'?'block':'none';
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(tab==='today'&&i===0)||(tab==='history'&&i===1)));
  if(tab==='history')renderHistory();
}
function clockIn(){
  if(getToday()){showToast('本日はすでに出勤済みです');return;}
  records.unshift({date:todayKey(),in:nowTimeStr(),out:''});
  save();render();showToast('出勤打刻しました ✓');
}
function clockOut(){
  const t=getToday();
  if(!t||t.out){showToast('先に出勤打刻してください');return;}
  t.out=nowTimeStr();save();render();
  const c=calcDay(t);
  showToast(`退勤打刻しました${c?' 実労働時間'+hm(c.totalMins):''} ✓`);
}
function overlayTap(e){if(e.target===document.getElementById('editOverlay'))closeEdit();}
function openAdd(){
  editIdx=null;
  document.getElementById('editTitle').textContent='記録を追加';
  document.getElementById('editDate').value=todayKey();
  document.getElementById('editDate').removeAttribute('min');
  document.getElementById('editDate').removeAttribute('max');
  document.getElementById('editIn').value='08:00';
  document.getElementById('editOut').value='17:00';
  document.getElementById('btnDel').style.display='none';
  document.getElementById('editOverlay').classList.add('open');
}
function openAddForPeriod(start,end){
  editIdx=null;
  document.getElementById('editTitle').textContent='記録を追加';
  document.getElementById('editDate').value=start;
  document.getElementById('editDate').min=start;
  document.getElementById('editDate').max=end;
  document.getElementById('editIn').value='08:00';
  document.getElementById('editOut').value='17:00';
  document.getElementById('btnDel').style.display='none';
  document.getElementById('editOverlay').classList.add('open');
}
function openEdit(idx){
  editIdx=idx;const r=records[idx];
  document.getElementById('editTitle').textContent=r.date+' の記録を編集';
  document.getElementById('editDate').value=r.date;
  document.getElementById('editDate').removeAttribute('min');
  document.getElementById('editDate').removeAttribute('max');
  document.getElementById('editIn').value=r.in||'';
  document.getElementById('editOut').value=r.out||'';
  document.getElementById('btnDel').style.display='block';
  document.getElementById('editOverlay').classList.add('open');
}
function closeEdit(){document.getElementById('editOverlay').classList.remove('open');editIdx=null;}
function saveEdit(){
  const date=document.getElementById('editDate').value;
  const inT=document.getElementById('editIn').value;
  const outT=document.getElementById('editOut').value;
  if(!date||!inT){showToast('日付と出勤時刻は必須です');return;}
  if(outT&&inT>=outT){showToast('退勤は出勤より後にしてください');return;}
  if(editIdx===null){
    if(records.find(r=>r.date===date)){showToast('その日付の記録がすでにあります');return;}
    records.push({date,in:inT,out:outT});
  } else {
    records[editIdx]={date,in:inT,out:outT};
  }
  records.sort((a,b)=>b.date.localeCompare(a.date));
  save();render();closeEdit();
  showToast(editIdx===null?'記録を追加しました ✓':'記録を更新しました ✓');
}
function deleteRecord(){
  if(!confirm('この記録を削除しますか？'))return;
  records.splice(editIdx,1);save();render();closeEdit();showToast('削除しました');
}
function downloadCSV(){
  const p=getCurrentPeriod(),pr=records.filter(r=>inPeriod(r.date,p));
  if(!pr.length){showToast('今期の記録がありません');return;}
  let csv='\uFEFF日付,出勤,退勤,実労働(分),時間外(分)\n',tw=0,tot=0;
  pr.forEach(r=>{const c=calcDay(r);csv+=`${r.date},${r.in||''},${r.out||''},${c?c.totalMins:''},${c?c.otMins:''}\n`;if(c){tw+=c.totalMins;tot+=c.otMins;}});
  csv+=`\n合計,,,${tw},${tot}\n`;
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`勤怠_${p.start.slice(0,7)}.csv`;a.click();showToast('CSVをダウンロードしました');
}
function updateOTBanner(){
  const p=getCurrentPeriod(),pr=records.filter(r=>inPeriod(r.date,p));
  let tot=0;pr.forEach(r=>{const c=calcDay(r);if(c)tot+=c.otMins;});
  const t=getToday();
  if(t&&t.in&&!t.out){
    const n=new Date(),inM=toMins(t.in),nowM=n.getHours()*60+n.getMinutes();
    tot+=(inM<WORK_START?WORK_START-inM:0)+(nowM>WORK_END?nowM-WORK_END:0);
  }
  const isOver=tot>0;
  document.getElementById('otBanner').className='ot-banner '+(isOver?'over':'none');
  document.getElementById('otLabel').className='ot-left'+(isOver?' over':'');
  document.getElementById('otSub').className='ot-sub'+(isOver?' over':'');
  document.getElementById('otValue').className='ot-right'+(isOver?' over':'');
  document.getElementById('otValue').textContent=hm(tot);
  document.getElementById('otSub').textContent=`${p.start.slice(5).replace('-','/')} 〜 ${p.end.slice(5).replace('-','/')}`;
}
function updateClock(){
  const n=new Date();
  document.getElementById('clockTime').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  document.getElementById('clockDate').textContent=n.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  const t=getToday();
  if(t&&t.in&&!t.out){
    const inM=toMins(t.in),nowM=n.getHours()*60+n.getMinutes();
    document.getElementById('todayH').textContent=hm(Math.max(0,nowM-inM-BREAK_MINS));
    const ot=(inM<WORK_START?WORK_START-inM:0)+(nowM>WORK_END?nowM-WORK_END:0);
    const el=document.getElementById('todayOT');
    el.textContent=hm(ot);el.className='stat-val'+(ot>0?' ot':'');
    updateOTBanner();
  }
}
function renderHistory(){
  const periods=[getCurrentPeriod(),...getPastPeriods(12)];
  const container=document.getElementById('histPeriods');container.innerHTML='';
  periods.forEach((period,pi)=>{
    const pr=records.filter(r=>inPeriod(r.date,period));
    let tw=0,tot=0;pr.forEach(r=>{const c=calcDay(r);if(c){tw+=c.totalMins;tot+=c.otMins;}});
    const isOver=tot>0;
    const label=pi===0?`今期（${period.start.slice(5).replace('-','/')}〜${period.end.slice(5).replace('-','/')}）`
      :`${period.start.slice(0,7).replace('-','/')}（${period.start.slice(5).replace('-','/')}〜${period.end.slice(5).replace('-','/')}）`;
    const div=document.createElement('div');div.className='hist-period';
    div.innerHTML=`<div class="hp-top"><div class="hp-label">${label}</div><div class="hp-ot ${isOver?'over':'zero'}">${tot>0?'+'+hm(tot):'0h00m'}</div></div>
      <div class="hp-sub"><span>出勤 ${pr.length}日</span><span>実労働時間 ${hm(tw)}</span><span>時間外 ${hm(tot)}</span></div>
      <div class="hp-detail" id="det-${pi}">
        ${pr.length===0?'<div style="font-size:12px;color:#8E8E93;padding:6px 0">記録なし</div>':
          pr.map(r=>{const idx=records.indexOf(r);const c=calcDay(r);
            return `<div class="hp-rec" onclick="openEdit(${idx})"><span class="hp-rec-date">${r.date}</span><span class="hp-rec-work">${r.in||'--'}→${r.out||'--'} ${c?hm(c.totalMins):'--'}</span><span class="hp-rec-ot">${c&&c.otMins>0?'+'+hm(c.otMins):''}</span></div>`;
          }).join('')}
        <button class="btn-add-period" onclick="openAddForPeriod('${period.start}','${period.end}')">＋ この期間に追加</button>
      </div>`;
    div.querySelector('.hp-top').addEventListener('click',()=>{
      const d=document.getElementById(`det-${pi}`);d.classList.toggle('open');div.classList.toggle('expanded',d.classList.contains('open'));
    });
    container.appendChild(div);
  });
}
function render(){
  const t=getToday(),p=getCurrentPeriod();
  document.getElementById('periodLabel').textContent=`${p.start.slice(5).replace('-','/')} 〜 ${p.end.slice(5).replace('-','/')}`;
  const btnIn=document.getElementById('btnIn'),btnOut=document.getElementById('btnOut');
  if(!t){
    document.getElementById('statusText').textContent='未打刻';
    btnIn.disabled=false;btnOut.disabled=true;
    document.getElementById('todayH').textContent='--';
    document.getElementById('todayOT').textContent='--';
    document.getElementById('todayOT').className='stat-val';
  } else if(t.in&&!t.out){
    document.getElementById('statusText').textContent=`勤務中（出勤 ${t.in}）`;
    btnIn.disabled=true;btnOut.disabled=false;
  } else {
    const c=calcDay(t);
    document.getElementById('statusText').textContent=`退勤済（${t.in} → ${t.out}）`;
    if(c){document.getElementById('todayH').textContent=hm(c.totalMins);const el=document.getElementById('todayOT');el.textContent=hm(c.otMins);el.className='stat-val'+(c.otMins>0?' ot':'');}
    btnIn.disabled=true;btnOut.disabled=true;
  }
  const pr=records.filter(r=>inPeriod(r.date,p));
  let tw=0,tot=0;pr.forEach(r=>{const c=calcDay(r);if(c){tw+=c.totalMins;tot+=c.otMins;}});
  document.getElementById('periodDays').textContent=pr.length+'日';
  document.getElementById('monthH').textContent=hm(tw);
  const target=DAILY_MINS*MONTH_WORK_DAYS,pct=target>0?Math.min(tw/target*100,120):0;
  const fill=document.getElementById('progressFill');
  fill.style.width=Math.min(pct,100)+'%';fill.className='progress-fill'+(pct>100?' over':'');
  document.getElementById('progressLabel').textContent=`${hm(tw)} / ${hm(target)}`;
  updateOTBanner();
  const list=document.getElementById('historyList');list.innerHTML='';
  pr.forEach(r=>{
    const idx=records.indexOf(r),c=calcDay(r);
    const ws=c?hm(c.totalMins):(r.out?'--':'退勤未打刻');
    const os=c&&c.otMins>0?`<span class="rec-ot">時間外 ${hm(c.otMins)}${c.earlyOT>0?' (早出含)':''}</span>`:'';
    list.innerHTML+=`<div class="record" onclick="openEdit(${idx})"><div class="rec-top"><span class="rec-date">${r.date}</span><span class="rec-times"><span class="dot-in">●</span>${r.in||'--'}&nbsp;<span class="dot-out">●</span>${r.out||'--'}</span></div><div class="rec-detail"><span>実労働時間 ${ws}</span>${os}</div></div>`;
  });
}
render();clearInterval(timerInt);timerInt=setInterval(updateClock,1000);updateClock();
</script>
</body>
