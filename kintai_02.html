<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="勤怠">
<title>勤怠記録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:#F2F2F7;color:#1C1C1E;min-height:100vh;}
.wrap{padding:1rem;max-width:430px;margin:0 auto;padding-bottom:2rem;}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:1rem;background:#E5E5EA;border-radius:10px;padding:3px;}
.tab{padding:.5rem 0;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:#6E6E73;transition:all .2s;}
.tab.active{background:#fff;color:#1C1C1E;box-shadow:0 1px 3px rgba(0,0,0,.12);}
.clock-time{font-size:42px;font-weight:200;color:#1C1C1E;letter-spacing:-1px;text-align:center;font-variant-numeric:tabular-nums;}
.clock-date{font-size:13px;color:#8E8E93;text-align:center;margin-top:2px;margin-bottom:.9rem;}
.period-badge{text-align:center;margin-bottom:.9rem;}
.period-badge span{font-size:12px;color:#8E8E93;background:#fff;border-radius:20px;padding:4px 14px;display:inline-block;}
.warning-banner{background:#FFF3CD;border:1px solid #FFCA28;border-radius:14px;padding:.9rem 1.1rem;margin-bottom:.9rem;display:flex;align-items:center;gap:.75rem;cursor:pointer;}
.warning-icon{font-size:20px;}
.warning-text{font-size:13px;color:#856404;font-weight:500;}
.warning-sub{font-size:11px;color:#856404;margin-top:2px;}
.status-card{background:#fff;border-radius:14px;padding:.9rem 1.1rem;margin-bottom:.9rem;text-align:center;}
.status-label{font-size:11px;color:#8E8E93;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;}
.status-value{font-size:15px;font-weight:500;color:#1C1C1E;}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.5rem;}
.btn-in,.btn-out{padding:1.1rem 0;border-radius:14px;font-size:20px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s,transform .1s;-webkit-appearance:none;}
.btn-in{background:#34C759;color:#fff;}
.btn-out{background:#FF3B30;color:#fff;}
.btn-in:disabled,.btn-out:disabled{opacity:.3;cursor:not-allowed;}
.btn-in:not(:disabled):active,.btn-out:not(:disabled):active{transform:scale(.97);}
.btn-reset{width:100%;padding:.6rem 0;border-radius:14px;font-size:14px;font-weight:500;cursor:pointer;border:0.5px solid #FF3B30;background:none;color:#FF3B30;margin-bottom:.5rem;}
.btn-reset:active{opacity:.7;}
/* 有給ボタン */

/* 時間外バナー */
.ot-banner{border-radius:14px;padding:.85rem 1.1rem;margin-bottom:.9rem;display:flex;align-items:center;justify-content:space-between;}
.ot-banner.zero{background:#fff;}
.ot-banner.plus{background:#FFF2F1;}
.ot-banner.minus{background:#F0FFF4;}
.ot-left{font-size:12px;color:#8E8E93;}
.ot-left.plus{color:#C0392B;}
.ot-left.minus{color:#1A7A3A;}
.ot-right{font-size:26px;font-weight:300;color:#1C1C1E;font-variant-numeric:tabular-nums;}
.ot-right.plus{color:#FF3B30;}
.ot-right.minus{color:#34C759;}
.ot-sub{font-size:11px;color:#8E8E93;margin-top:2px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.9rem;}
.stat{background:#fff;border-radius:14px;padding:.75rem 1rem;}
.stat-label{font-size:11px;color:#8E8E93;margin-bottom:4px;}
.stat-val{font-size:18px;font-weight:300;color:#1C1C1E;font-variant-numeric:tabular-nums;}
.stat-val.plus{color:#FF3B30;}
.stat-val.minus{color:#34C759;}
/* 累計バー */
.cumulative-wrap{background:#fff;border-radius:14px;padding:.85rem 1rem;margin-bottom:.9rem;}
.cumulative-label{display:flex;justify-content:space-between;font-size:12px;color:#8E8E93;margin-bottom:6px;}
.cumulative-bar{height:10px;background:#E5E5EA;border-radius:5px;overflow:hidden;display:flex;}
.bar-work{height:100%;background:#34C759;transition:width .4s;}
.bar-leave{height:100%;background:#FF3B30;transition:width .4s;}
.cumulative-legend{display:flex;gap:12px;margin-top:6px;font-size:11px;color:#8E8E93;}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;}
.info-box{background:#fff;border-radius:14px;padding:.75rem 1rem;margin-bottom:.9rem;font-size:11px;color:#8E8E93;line-height:1.8;}
.sec-title{font-size:13px;font-weight:500;color:#8E8E93;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;padding:0 2px;}
.sec-btns{display:flex;gap:6px;}
.btn-sm{font-size:12px;background:#fff;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;color:#007AFF;font-weight:500;}
.btn-add{font-size:13px;background:#34C759;color:#fff;border:none;border-radius:8px;padding:5px 12px;cursor:pointer;font-weight:500;}
.record{background:#fff;border-radius:14px;padding:.75rem 1rem;margin-bottom:8px;cursor:pointer;transition:background .15s;}
.record:active{background:#F2F2F7;}
.record.has-leave{border-left:3px solid #FF3B30;}
.rec-top{display:flex;justify-content:space-between;align-items:center;}
.rec-date{font-size:13px;color:#8E8E93;}
.rec-times{font-size:14px;color:#1C1C1E;}
.rec-detail{font-size:11px;color:#8E8E93;margin-top:3px;display:flex;justify-content:space-between;}
.rec-leave{font-size:11px;color:#FF3B30;margin-top:2px;}
.rec-ot-plus{color:#FF3B30;}
.rec-ot-minus{color:#34C759;}
.dot-in{color:#34C759;}
.dot-out{color:#FF3B30;}
.hist-period{background:#fff;border-radius:14px;padding:.85rem 1rem;margin-bottom:8px;cursor:pointer;}
.hist-period.expanded{outline:1.5px solid #E5E5EA;}
.hp-top{display:flex;justify-content:space-between;align-items:center;}
.hp-label{font-size:14px;font-weight:500;color:#1C1C1E;}
.hp-ot{font-size:15px;font-weight:500;}
.hp-ot.zero{color:#8E8E93;}
.hp-ot.plus{color:#FF3B30;}
.hp-ot.minus{color:#34C759;}
.hp-sub{font-size:11px;color:#8E8E93;margin-top:4px;display:flex;gap:12px;flex-wrap:wrap;}
.hp-detail{margin-top:.75rem;border-top:0.5px solid #E5E5EA;padding-top:.75rem;display:none;}
.hp-detail.open{display:block;}
.hp-rec{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 0;border-bottom:0.5px solid #F2F2F7;cursor:pointer;}
.hp-rec:last-of-type{border-bottom:none;}
.hp-rec-date{color:#8E8E93;width:55px;}
.hp-rec-work{color:#1C1C1E;flex:1;text-align:center;}
.hp-rec-leave{color:#FF3B30;font-size:11px;text-align:center;width:55px;}
.hp-rec-ot{width:55px;text-align:right;}
.hp-rec-ot.plus{color:#FF3B30;}
.hp-rec-ot.minus{color:#34C759;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.85);backdrop-filter:blur(10px);border-radius:20px;padding:.6rem 1.2rem;font-size:13px;color:#fff;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:100;}
.toast.show{opacity:1;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#F2F2F7;border-radius:20px 20px 0 0;padding:1.25rem 1.25rem 2.5rem;width:100%;max-width:430px;}
.modal-handle{width:36px;height:4px;background:#C7C7CC;border-radius:2px;margin:0 auto 1rem;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:1.25rem;color:#1C1C1E;text-align:center;}
.field{background:#fff;border-radius:12px;padding:.75rem 1rem;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.field label{font-size:15px;color:#1C1C1E;}
.field input,.field select{border:none;background:none;font-size:15px;color:#007AFF;text-align:right;outline:none;}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1rem;}
.modal-btns button{padding:.75rem 0;border-radius:12px;font-size:16px;cursor:pointer;border:none;background:#fff;color:#1C1C1E;font-weight:500;}
.modal-btns .btn-save{background:#34C759;color:#fff;}
.btn-del-yellow{margin-top:8px;width:100%;padding:.75rem 0;border-radius:12px;font-size:15px;cursor:pointer;border:none;background:#FFF3CD;color:#856404;font-weight:500;}
.btn-del{margin-top:8px;width:100%;padding:.75rem 0;border-radius:12px;font-size:15px;cursor:pointer;border:none;background:#fff;color:#FF3B30;font-weight:500;}
.btn-add-period{margin-top:8px;width:100%;padding:.55rem 0;border-radius:10px;font-size:13px;cursor:pointer;border:none;background:#F2F2F7;color:#34C759;font-weight:500;}
</style>
</head>
<body>
<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">打刻</button>
    <button class="tab" onclick="switchTab('history')">実績</button>
  </div>

  <div id="tabToday">
    <div class="clock-time" id="clockTime">--:--:--</div>
    <div class="clock-date" id="clockDate"></div>
    <div class="period-badge"><span id="periodLabel">集計期間：--</span></div>

    <div id="warningBanner" style="display:none;" class="warning-banner">
      <div class="warning-icon">⚠️</div>
      <div>
        <div class="warning-text">退勤打刻が未入力です</div>
        <div class="warning-sub" id="warningDate"></div>
      </div>
    </div>

    <div class="status-card">
      <div class="status-label">今日のステータス</div>
      <div class="status-value" id="statusText">未打刻</div>
    </div>

    <div class="btn-row">
      <button class="btn-in" id="btnIn" onclick="clockIn()">出勤</button>
      <button class="btn-out" id="btnOut" onclick="clockOut()" disabled>退勤</button>
    </div>
    <button class="btn-reset" id="btnReset" onclick="resetClockIn()" style="display:none;">出勤打刻をリセット</button>

    <div class="ot-banner zero" id="otBanner">
      <div>
        <div class="ot-left" id="otLabel">今月の時間外（累計）</div>
        <div class="ot-sub" id="otSub">--</div>
      </div>
      <div class="ot-right" id="otValue">0h00m</div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-label">今日の実労働時間</div><div class="stat-val" id="todayH">--</div></div>
      <div class="stat"><div class="stat-label">今月の時間外</div><div class="stat-val" id="todayOT">--</div></div>
      <div class="stat"><div class="stat-label">今月の出勤日数</div><div class="stat-val" id="periodDays">0日</div></div>
      <div class="stat"><div class="stat-label">有給消化</div><div class="stat-val" id="leaveTotal" style="font-size:14px;">--</div></div>
    </div>

    <!-- 累計バー -->
    <div class="cumulative-wrap">
      <div class="cumulative-label">
        <span>今月の累計</span>
        <span id="cumulativeLabel">0 / 0h</span>
      </div>
      <div class="cumulative-bar">
        <div class="bar-work" id="barWork" style="width:0%"></div>
        <div class="bar-leave" id="barLeave" style="width:0%"></div>
      </div>
      <div class="cumulative-legend">
        <span><span class="legend-dot" style="background:#34C759"></span>実労働</span>
        <span><span class="legend-dot" style="background:#FF3B30"></span>有給</span>
      </div>
    </div>

    <div class="info-box">
      休憩 自動差引：10:00〜10:10 / 12:00〜12:45 / 15:00〜15:10（計65分）<br>
      定時：7時間55分　／　締め：毎月21日〜翌20日
    </div>

    <div class="sec-title">
      <span>今月の記録（タップで編集）</span>
      <div class="sec-btns">
        <button class="btn-add" onclick="openAdd()">＋ 追加</button>
        <button class="btn-sm" onclick="downloadCSV()">📥 CSV</button>
      </div>
    </div>
    <div id="historyList"></div>
  </div>

  <div id="tabHistory" style="display:none;">
    <div class="sec-title"><span>過去12ヶ月の実績</span></div>
    <div id="histPeriods"></div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="overlay" id="editOverlay" onclick="overlayTap(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title" id="editTitle">記録を追加</div>
    <div class="field"><label>日付</label><input type="date" id="editDate"></div>
    <div class="field"><label>出勤時刻</label><input type="time" id="editIn"></div>
    <div class="field"><label>退勤時刻</label><input type="time" id="editOut"></div>
    <div class="field">
      <label>有給</label>
      <select id="editLeave" style="color:#007AFF;border:none;background:none;font-size:15px;outline:none;">
        <option value="">なし</option>
        <option value="all">全日有給</option>
        <option value="half">半日有給</option>
        <option value="1h">時間休1h</option>
        <option value="2h">時間休2h</option>
        <option value="3h">時間休3h</option>
      </select>
    </div>
    <div class="modal-btns">
      <button onclick="closeEdit()">キャンセル</button>
      <button class="btn-save" onclick="saveEdit()">保存</button>
    </div>
    <button class="btn-del-yellow" id="btnCancelOut" onclick="cancelClockOut()" style="display:none;">退勤を取り消す</button>
    <button class="btn-del" id="btnDel" onclick="deleteRecord()" style="display:none;">この記録を削除</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BREAK_MINS = 65;
const DAILY_MINS = 7 * 60 + 55; // 475分

// 有給の分数換算
const LEAVE_MINS = {
  'all': DAILY_MINS,  // 全日 = 7h55m
  'half': 4 * 60,     // 半日 = 4h
  '1h': 60,
  '2h': 120,
  '3h': 180
};
const LEAVE_LABEL = {
  'all': '全日有給',
  'half': '半日有給',
  '1h': '時間休1h',
  '2h': '時間休2h',
  '3h': '時間休3h'
};

// 期間ごとの所定労働日数
function getWorkDays(period) {
  const map = {
    '2026-04-21': 18,
    '2026-05-21': 22,
    '2026-06-21': 20,
    '2026-07-21': 19,
    '2026-08-21': 21,
    '2026-09-21': 18,
    '2026-10-21': 22,
    '2026-11-21': 19,
    '2026-12-21': 17,
    '2027-01-21': 21,
    '2027-02-21': 19,
  };
  return map[period.start] || 20;
}

let records = JSON.parse(localStorage.getItem('kintai_v7') || '[]');
let editIdx = null;
let timerInt;

function pad(n){return String(n).padStart(2,'0');}
function todayKey(){const n=new Date();return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;}
function yesterdayKey(){const n=new Date();n.setDate(n.getDate()-1);return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;}
function nowTimeStr(){const n=new Date();return `${pad(n.getHours())}:${pad(n.getMinutes())}`;}
function toMins(t){if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m;}
function hm(mins){
  const sign=mins<0?'-':'';
  const a=Math.abs(Math.round(mins));
  return `${sign}${Math.floor(a/60)}h${pad(a%60)}m`;
}
function save(){localStorage.setItem('kintai_v7',JSON.stringify(records));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function getToday(){return records.find(r=>r.date===todayKey())||null;}

function getCurrentPeriod(){
  const now=new Date(),d=now.getDate(),y=now.getFullYear(),m=now.getMonth();
  let sY,sM,eY,eM;
  if(d<=20){sM=m-1;sY=y;if(sM<0){sM=11;sY=y-1;}eM=m;eY=y;}
  else{sM=m;sY=y;eM=m+1;eY=y;if(eM>11){eM=0;eY=y+1;}}
  return{start:`${sY}-${pad(sM+1)}-21`,end:`${eY}-${pad(eM+1)}-20`};
}
function getPastPeriods(n){
  const periods=[],now=new Date(),d=now.getDate(),y=now.getFullYear(),m=now.getMonth();
  let baseY=y,baseM=m;
  if(d<=20){baseM=m-1;if(baseM<0){baseM=11;baseY=y-1;}}
  for(let i=1;i<=n;i++){
    let sM=baseM-i,sY=baseY;
    while(sM<0){sM+=12;sY--;}
    let eM=sM+1,eY=sY;
    if(eM>11){eM=0;eY=sY+1;}
    periods.push({start:`${sY}-${pad(sM+1)}-21`,end:`${eY}-${pad(eM+1)}-20`});
  }
  return periods;
}
function inPeriod(d,p){return d>=p.start&&d<=p.end;}

// 勤務時間計算
function calcDay(r){
  if(!r.in||!r.out)return null;
  const inM=toMins(r.in),outM=toMins(r.out);
  if(outM<=inM)return null;
  const breaks=[{s:10*60,e:10*60+10},{s:12*60,e:12*60+45},{s:15*60,e:15*60+10}];
  let bMins=0;
  breaks.forEach(b=>{
    const os=Math.max(inM,b.s),oe=Math.min(outM,b.e);
    if(oe>os)bMins+=oe-os;
  });
  const totalMins=Math.max(0,outM-inM-bMins);
  // 有給がある日は時間外計算スキップ
  const otMins=r.leave?0:totalMins-DAILY_MINS;
  return{totalMins,otMins};
}

// 有給のみの日（打刻なし）の計算
function calcLeaveOnly(r){
  if(!r.leave||r.in)return null;
  const leaveMins=LEAVE_MINS[r.leave]||0;
  return{totalMins:leaveMins,otMins:0};
}

// 有給消化の集計
function calcLeaveStats(pr){
  let days=0, hours=0;
  pr.forEach(r=>{
    if(!r.leave)return;
    if(r.leave==='all') days+=1;
    else if(r.leave==='half') days+=0.5;
    else if(r.leave==='1h') hours+=1;
    else if(r.leave==='2h') hours+=2;
    else if(r.leave==='3h') hours+=3;
  });
  return{days,hours};
}

function switchTab(tab){
  document.getElementById('tabToday').style.display=tab==='today'?'block':'none';
  document.getElementById('tabHistory').style.display=tab==='history'?'block':'none';
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(tab==='today'&&i===0)||(tab==='history'&&i===1)));
  if(tab==='history')renderHistory();
}

function clockIn(){
  if(getToday()){showToast('本日はすでに出勤済みです');return;}
  const t=getToday();
  records.push({date:todayKey(),in:nowTimeStr(),out:'',leave:''});
  records.sort((a,b)=>a.date.localeCompare(b.date));
  save();render();showToast('出勤打刻しました ✓');
}
function clockOut(){
  const t=getToday();
  if(!t||t.out){showToast('先に出勤打刻してください');return;}
  t.out=nowTimeStr();save();render();
  const c=calcDay(t);
  showToast(`退勤打刻しました${c?' 実労働'+hm(c.totalMins):''} ✓`);
}
function resetClockIn(){
  if(!confirm('本日の出勤打刻をリセットしますか？'))return;
  const idx=records.findIndex(r=>r.date===todayKey());
  if(idx!==-1){records.splice(idx,1);save();render();showToast('出勤打刻をリセットしました');}
}

// 有給トグル
function toggleLeave(type){
  let t=getToday();
  if(!t){
    // 打刻なしで有給のみ記録
    t={date:todayKey(),in:'',out:'',leave:''};
    records.push(t);
    records.sort((a,b)=>a.date.localeCompare(b.date));
  }
  t.leave = t.leave===type?'':type;
  save();render();
  showToast(t.leave?`${LEAVE_LABEL[type]}を記録しました`:'有給を取り消しました');
}

function overlayTap(e){if(e.target===document.getElementById('editOverlay'))closeEdit();}
function openAdd(){
  editIdx=null;
  document.getElementById('editTitle').textContent='記録を追加';
  document.getElementById('editDate').value=todayKey();
  document.getElementById('editDate').removeAttribute('min');
  document.getElementById('editDate').removeAttribute('max');
  document.getElementById('editIn').value='08:00';
  document.getElementById('editOut').value='17:00';
  document.getElementById('editLeave').value='';
  document.getElementById('btnDel').style.display='none';
  document.getElementById('btnCancelOut').style.display='none';
  document.getElementById('editOverlay').classList.add('open');
}
function openAddForPeriod(start,end){
  editIdx=null;
  document.getElementById('editTitle').textContent='記録を追加';
  document.getElementById('editDate').value=start;
  document.getElementById('editDate').min=start;
  document.getElementById('editDate').max=end;
  document.getElementById('editIn').value='08:00';
  document.getElementById('editOut').value='17:00';
  document.getElementById('editLeave').value='';
  document.getElementById('btnDel').style.display='none';
  document.getElementById('btnCancelOut').style.display='none';
  document.getElementById('editOverlay').classList.add('open');
}
function openEdit(idx){
  editIdx=idx;const r=records[idx];
  document.getElementById('editTitle').textContent=r.date+' の記録を編集';
  document.getElementById('editDate').value=r.date;
  document.getElementById('editDate').removeAttribute('min');
  document.getElementById('editDate').removeAttribute('max');
  document.getElementById('editIn').value=r.in||'';
  document.getElementById('editOut').value=r.out||'';
  document.getElementById('editLeave').value=r.leave||'';
  document.getElementById('btnDel').style.display='block';
  document.getElementById('btnCancelOut').style.display=r.out?'block':'none';
  document.getElementById('editOverlay').classList.add('open');
}
function closeEdit(){document.getElementById('editOverlay').classList.remove('open');editIdx=null;}
function saveEdit(){
  const date=document.getElementById('editDate').value;
  const inT=document.getElementById('editIn').value;
  const outT=document.getElementById('editOut').value;
  const leave=document.getElementById('editLeave').value;
  if(!date){showToast('日付は必須です');return;}
  if(inT&&outT&&inT>=outT){showToast('退勤は出勤より後にしてください');return;}
  if(editIdx===null){
    if(records.find(r=>r.date===date)){showToast('その日付の記録がすでにあります');return;}
    records.push({date,in:inT,out:outT,leave});
  } else {
    records[editIdx]={date,in:inT,out:outT,leave};
  }
  records.sort((a,b)=>a.date.localeCompare(b.date));
  save();render();closeEdit();
  showToast(editIdx===null?'記録を追加しました ✓':'記録を更新しました ✓');
}
function cancelClockOut(){
  if(!confirm('退勤打刻を取り消しますか？'))return;
  records[editIdx].out='';
  save();render();closeEdit();showToast('退勤打刻を取り消しました');
}
function deleteRecord(){
  if(!confirm('この記録を削除しますか？'))return;
  records.splice(editIdx,1);save();render();closeEdit();showToast('削除しました');
}

function downloadCSV(){
  const p=getCurrentPeriod();
  const pr=records.filter(r=>inPeriod(r.date,p));
  if(!pr.length){showToast('今月の記録がありません');return;}
  let csv='\uFEFF日付,出勤,退勤,実労働時間,時間外,有給\n';
  let tw=0,tot=0;
  pr.forEach(r=>{
    const c=r.in?calcDay(r):calcLeaveOnly(r);
    csv+=`${r.date},${r.in||''},${r.out||''},${c?hm(c.totalMins):''},${c?hm(c.otMins):''},${r.leave?LEAVE_LABEL[r.leave]:''}\n`;
    if(c){tw+=c.totalMins;tot+=c.otMins;}
  });
  csv+=`\n合計,,,${hm(tw)},${hm(tot)}\n`;
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`勤怠_${p.start.slice(0,7)}.csv`;a.click();
  showToast('CSVをダウンロードしました');
}

function updateOTBanner(){
  const p=getCurrentPeriod();
  const yesterday=yesterdayKey();
  const prYesterday=records.filter(r=>inPeriod(r.date,p)&&r.date<=yesterday);
  let tot=0;
  prYesterday.forEach(r=>{
    const c=r.in?calcDay(r):calcLeaveOnly(r);
    if(c)tot+=c.otMins;
  });
  const banner=document.getElementById('otBanner');
  const label=document.getElementById('otLabel');
  const val=document.getElementById('otValue');
  val.textContent=hm(tot);
  if(tot>0){
    banner.className='ot-banner plus';label.className='ot-left plus';val.className='ot-right plus';
  } else if(tot<0){
    banner.className='ot-banner minus';label.className='ot-left minus';val.className='ot-right minus';
  } else {
    banner.className='ot-banner zero';label.className='ot-left';val.className='ot-right';
  }
  const p2=getCurrentPeriod();
  document.getElementById('otSub').textContent=`${p2.start.slice(5).replace('-','/')} 〜 ${p2.end.slice(5).replace('-','/')} 前日まで`;
}

function updateClock(){
  const n=new Date();
  document.getElementById('clockTime').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  document.getElementById('clockDate').textContent=n.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  const t=getToday();
  if(t&&t.in&&!t.out){
    const inM=toMins(t.in),nowM=n.getHours()*60+n.getMinutes();
    const breaks=[{s:10*60,e:10*60+10},{s:12*60,e:12*60+45},{s:15*60,e:15*60+10}];
    let bMins=0;
    breaks.forEach(b=>{const os=Math.max(inM,b.s),oe=Math.min(nowM,b.e);if(oe>os)bMins+=oe-os;});
    const elapsed=Math.max(0,nowM-inM-bMins);
    document.getElementById('todayH').textContent=hm(elapsed);
  }
}

function checkWarning(){
  const yesterday=yesterdayKey();
  const yRec=records.find(r=>r.date===yesterday);
  const banner=document.getElementById('warningBanner');
  if(yRec&&yRec.in&&!yRec.out){
    banner.style.display='flex';
    document.getElementById('warningDate').textContent=`${yesterday} の退勤が未入力です。タップして入力してください。`;
    banner.onclick=()=>openEdit(records.indexOf(yRec));
  } else {
    banner.style.display='none';
  }
}

function renderHistory(){
  const periods=[getCurrentPeriod(),...getPastPeriods(12)];
  const container=document.getElementById('histPeriods');container.innerHTML='';
  periods.forEach((period,pi)=>{
    const pr=records.filter(r=>inPeriod(r.date,period));
    let tw=0,tot=0;
    pr.forEach(r=>{const c=r.in?calcDay(r):calcLeaveOnly(r);if(c){tw+=c.totalMins;tot+=c.otMins;}});
    const ls=calcLeaveStats(pr);
    const otClass=tot>0?'plus':tot<0?'minus':'zero';
    const label=pi===0?`今月（${period.start.slice(5).replace('-','/')}〜${period.end.slice(5).replace('-','/')}）`
      :`${period.start.slice(0,7).replace('-','/')}（${period.start.slice(5).replace('-','/')}〜${period.end.slice(5).replace('-','/')}）`;
    const leaveStr=ls.days>0||ls.hours>0?`有給 ${ls.days>0?ls.days+'日':''}${ls.hours>0?' '+ls.hours+'h':''}`.trim():'';
    const div=document.createElement('div');div.className='hist-period';
    div.innerHTML=`<div class="hp-top"><div class="hp-label">${label}</div><div class="hp-ot ${otClass}">${hm(tot)}</div></div>
      <div class="hp-sub"><span>出勤 ${pr.filter(r=>r.in).length}日</span><span>実労働 ${hm(tw)}</span><span>時間外 ${hm(tot)}</span>${leaveStr?`<span style="color:#FF3B30">${leaveStr}</span>`:''}</div>
      <div class="hp-detail" id="det-${pi}">
        ${pr.length===0?'<div style="font-size:12px;color:#8E8E93;padding:6px 0">記録なし</div>':
          pr.map(r=>{
            const idx=records.indexOf(r);const c=r.in?calcDay(r):calcLeaveOnly(r);
            const otClass2=c&&c.otMins>0?'plus':c&&c.otMins<0?'minus':'';
            const leaveTag=r.leave?`<span style="color:#FF3B30;font-size:10px">${LEAVE_LABEL[r.leave]}</span>`:'';
            return `<div class="hp-rec" onclick="openEdit(${idx})">
              <span class="hp-rec-date">${r.date.slice(5).replace('-','/')}</span>
              <span class="hp-rec-work">${r.in?r.in:'--'}→${r.out?r.out:'--'} ${c?hm(c.totalMins):'--'}</span>
              <span class="hp-rec-leave">${r.leave?LEAVE_LABEL[r.leave].replace('有給','').replace('時間休',''):''}</span>
              <span class="hp-rec-ot ${otClass2}">${c?hm(c.otMins):''}</span>
            </div>`;
          }).join('')}
        <button class="btn-add-period" onclick="openAddForPeriod('${period.start}','${period.end}')">＋ この月に追加</button>
      </div>`;
    div.querySelector('.hp-top').addEventListener('click',()=>{
      const d=document.getElementById(`det-${pi}`);d.classList.toggle('open');div.classList.toggle('expanded',d.classList.contains('open'));
    });
    container.appendChild(div);
  });
}

function render(){
  const t=getToday(),p=getCurrentPeriod();
  const btnIn=document.getElementById('btnIn');
  const btnOut=document.getElementById('btnOut');
  const btnReset=document.getElementById('btnReset');

  document.getElementById('periodLabel').textContent=`${p.start.slice(5).replace('-','/')} 〜 ${p.end.slice(5).replace('-','/')}`;
  checkWarning();

  if(!t){
    document.getElementById('statusText').textContent='未打刻';
    btnIn.disabled=false;btnOut.disabled=true;btnReset.style.display='none';
    document.getElementById('todayH').textContent='--';
  } else if(t.in&&!t.out){
    document.getElementById('statusText').textContent=`勤務中（出勤 ${t.in}）`;
    btnIn.disabled=true;btnOut.disabled=false;btnReset.style.display='block';
  } else if(t.in&&t.out){
    const c=calcDay(t);
    document.getElementById('statusText').textContent=`退勤済（${t.in} → ${t.out}）`;
    if(c) document.getElementById('todayH').textContent=hm(c.totalMins);
    btnIn.disabled=true;btnOut.disabled=true;btnReset.style.display='none';
  } else {
    document.getElementById('statusText').textContent=t.leave?`有給取得（${LEAVE_LABEL[t.leave]}）`:'未打刻';
    btnIn.disabled=false;btnOut.disabled=true;btnReset.style.display='none';
  }

  // 今月の集計
  const pr=records.filter(r=>inPeriod(r.date,p));
  let tw=0,tot=0,leaveMinsTotal=0;
  pr.forEach(r=>{
    const c=r.in?calcDay(r):calcLeaveOnly(r);
    if(c){tw+=c.totalMins;tot+=c.otMins;}
    if(r.leave) leaveMinsTotal+=LEAVE_MINS[r.leave]||0;
  });
  document.getElementById('periodDays').textContent=pr.filter(r=>r.in).length+'日';

  // 有給消化
  const ls=calcLeaveStats(pr);
  const leaveStr=[];
  if(ls.days>0) leaveStr.push(ls.days+'日');
  if(ls.hours>0) leaveStr.push(ls.hours+'h');
  document.getElementById('leaveTotal').textContent=leaveStr.length?leaveStr.join(' / '):'0日';

  // 今月の時間外（前日まで）
  const yesterday=yesterdayKey();
  const prY=pr.filter(r=>r.date<=yesterday);
  let totY=0;
  prY.forEach(r=>{const c=r.in?calcDay(r):calcLeaveOnly(r);if(c)totY+=c.otMins;});
  const otEl=document.getElementById('todayOT');
  otEl.textContent=hm(totY);
  otEl.className='stat-val'+(totY>0?' plus':totY<0?' minus':'');

  // 累計バー
  const target=DAILY_MINS*getWorkDays(p);
  const workPct=target>0?Math.min((tw/target)*100,100):0;
  const leavePct=target>0?Math.min((leaveMinsTotal/target)*100,100-workPct):0;
  document.getElementById('barWork').style.width=workPct+'%';
  document.getElementById('barLeave').style.width=leavePct+'%';
  document.getElementById('cumulativeLabel').textContent=`${hm(tw+leaveMinsTotal)} / ${hm(target)}`;

  updateOTBanner();

  // 記録一覧（昇順）
  const list=document.getElementById('historyList');list.innerHTML='';
  [...pr].reverse().forEach(r=>{
    const idx=records.indexOf(r);
    const c=r.in?calcDay(r):calcLeaveOnly(r);
    const ws=c?hm(c.totalMins):(r.out?'--':'退勤未打刻');
    const otClass=c&&c.otMins>0?'rec-ot-plus':c&&c.otMins<0?'rec-ot-minus':'';
    const otStr=c?`<span class="${otClass}">${hm(c.otMins)}</span>`:'';
    const leaveStr=r.leave?`<div class="rec-leave">🟡 ${LEAVE_LABEL[r.leave]}</div>`:'';
    const hasLeave=r.leave?'has-leave':'';
    list.innerHTML+=`<div class="record ${hasLeave}" onclick="openEdit(${idx})">
      <div class="rec-top">
        <span class="rec-date">${r.date}</span>
        <span class="rec-times"><span class="dot-in">●</span>${r.in||'--'}&nbsp;<span class="dot-out">●</span>${r.out||'--'}</span>
      </div>
      <div class="rec-detail"><span>実労働時間 ${ws}</span>${otStr}</div>
      ${leaveStr}
    </div>`;
  });
}

render();
clearInterval(timerInt);
timerInt=setInterval(updateClock,1000);
updateClock();
</script>
</body>
</html>
